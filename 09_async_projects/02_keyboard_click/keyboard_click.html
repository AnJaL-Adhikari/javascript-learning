<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyboard Click</title>
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #667eea, #764ba2);
}

.project {
    width: 90%;
    max-width: 700px;
    text-align: center;
}

#insert {
    display: flex;
    justify-content: center;
    align-items: center;
}

.key {
    background: white;
    padding: 25px 40px;
    border-radius: 15px;
    font-size: 24px;
    font-weight: bold;
    color: #333;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
}

.color {
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
}

table {
    border-collapse: collapse;
    width: 100%;
    min-width: 400px;
}

th {
    background: #667eea;
    color: white;
    padding: 15px;
    font-size: 18px;
}

td {
    padding: 15px;
    border: 1px solid #ddd;
    font-size: 18px;
    color: #333;
}

tr:nth-child(even) {
    background-color: #f5f5f5;
}

tr:hover {
    background-color: #e8e8ff;
}

@media (max-width: 500px) {
    .key {
        font-size: 18px;
        padding: 20px;
    }

    table {
        min-width: 300px;
    }

    th,
    td {
        padding: 10px;
        font-size: 14px;
    }
}
    </style>
</head>

<body>
    <div class="project">
        <div id="insert">

            <div class="key">Press the key and watch the magic</div>

        </div>

    </div>

</body>

<script>
    const insert = document.getElementById('insert')
    window.addEventListener('keydown', (e) => {
        insert.innerHTML = `<div class="color">
            <table>
  <tr>
    <th>Key</th>
    <th>Keycode</th>
    <th>Code</th>
  </tr>
  <tr>
    <td>${e.key }</td>
    <td>${e.keyCode }</td>
    <td>${e.code }</td>
  </tr>
 
</table>
            </div>`
    })
</script>

</html>
