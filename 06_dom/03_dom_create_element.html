<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>

    <style>
        .bg-black {
            background-color: #212121;
            color: #f1f1f1;
        }
    </style>

</head>

<body>

</body>

<script>

    // Create a new <div> element.
    // At this point, it exists only in memory.
    const div = document.createElement('div');
    console.log(div);

    // Add a class to the div.
    div.className = "main";

    // Assign a random id between 1 and 11.
    div.id = Math.round(Math.random() * 10 + 1);

    // Add a custom attribute.
    div.setAttribute("title", "generated title");

    // Apply inline styles.
    div.style.backgroundColor = "green";
    div.style.padding = "12px";

    /*
        Two ways to add text:

        1. innerText
           div.innerText = "Spider-man Brand New Day";

        2. createTextNode() + appendChild() (recommended when
           creating elements programmatically)
    */

    // Create a text node.
    const addText = document.createTextNode("Spider-man Brand New Day");

    // Append the text node to the div.
    div.appendChild(addText);

    // Finally, insert the div into the document.
    // Until this line runs, the div is not visible on the page.
    document.body.appendChild(div);

</script>

</html>
